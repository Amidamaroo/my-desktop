[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70
hwmon-path = /sys/class/hwmon/hwmon1/temp1_input
format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-warn = %temperature%
ramp-0 = "´ï£"
ramp-foreground = #a4ebf3

