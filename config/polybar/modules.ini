blacklist-1 = scroll lock
format = <label-layout> <label-indicator>
label-layout-padding = 1
label-layout-foreground = #fff
label-indicator-on = %name%
layout-icon-default = some-icon
layout-icon-0 = ´àÿ
layout-icon-1 = ´àò
label-indicator-on-capslock = !
label-indicator-off-capslock =

[module/weather]
type = custom/script
exec = $HOME/bspwm-dotfiles/bin/weather-plugin.sh
tail = false
interval = 960

[module/wireguard]
type = custom/script
exec = $HOME/bin/polybar-wireguard/polybar-wireguard.sh
tail = false
interval = 1
click-left = $HOME/bin/polybar-wireguard/polybar-wireguard.sh --toggle &

[module/popup-calendar]
type = custom/script
exec = /home/user/bin/cal
interval = 5
click-left = /home/user/bin/cal  --popup &
